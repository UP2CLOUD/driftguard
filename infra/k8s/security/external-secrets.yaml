# External Secrets Operator — pulls from GCP Secret Manager / AWS SM

---
# ClusterSecretStore for GCP (Workload Identity)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: "{{ .Values.gcpProject }}"
      auth:
        workloadIdentity:
          clusterLocation: europe-west1
          clusterName: driftguard-prod
          serviceAccountRef:
            name: external-secrets-sa
            namespace: driftguard-system
---
# ClusterSecretStore for AWS SM (for EKS / self-hosted on AWS)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: driftguard-system
---
# ExternalSecret: API secrets bundle
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: driftguard-api-secrets
  namespace: driftguard-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: driftguard-api-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "{{ .database_url }}"
        REDIS_URL: "{{ .redis_url }}"
        ANTHROPIC_API_KEY: "{{ .anthropic_key }}"
        GITHUB_APP_PRIVATE_KEY: "{{ .github_app_pk }}"
        GITHUB_WEBHOOK_SECRET: "{{ .github_webhook_secret }}"
        STRIPE_API_KEY: "{{ .stripe_secret }}"
        STRIPE_WEBHOOK_SECRET: "{{ .stripe_webhook_secret }}"
        SECRET_KEY: "{{ .secret_key }}"
        SLACK_WEBHOOK_URL: "{{ .slack_webhook_url }}"
  data:
  - secretKey: database_url
    remoteRef:
      key: driftguard-database-url
  - secretKey: redis_url
    remoteRef:
      key: driftguard-redis-url
  - secretKey: anthropic_key
    remoteRef:
      key: driftguard-anthropic-key
  - secretKey: github_app_pk
    remoteRef:
      key: driftguard-gh-app-pk
  - secretKey: github_webhook_secret
    remoteRef:
      key: driftguard-gh-webhook-secret
  - secretKey: stripe_secret
    remoteRef:
      key: driftguard-stripe-secret
  - secretKey: stripe_webhook_secret
    remoteRef:
      key: driftguard-stripe-webhook-secret
  - secretKey: secret_key
    remoteRef:
      key: driftguard-secret-key
  - secretKey: slack_webhook_url
    remoteRef:
      key: driftguard-slack-webhook-url
