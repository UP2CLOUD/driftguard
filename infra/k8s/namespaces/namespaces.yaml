---
apiVersion: v1
kind: Namespace
metadata:
  name: driftguard-system
  labels:
    app.kubernetes.io/part-of: driftguard
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    cilium.io/policy: enabled
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: system-quota
  namespace: driftguard-system
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "100"
    services: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: system-limits
  namespace: driftguard-system
spec:
  limits:
  - type: Container
    default:      { cpu: 500m,  memory: 512Mi }
    defaultRequest: { cpu: 100m, memory: 128Mi }
    max:          { cpu: "8",   memory: 16Gi }
---
apiVersion: v1
kind: Namespace
metadata:
  name: driftguard-data
  labels:
    app.kubernetes.io/part-of: driftguard
    pod-security.kubernetes.io/enforce: baseline
    cilium.io/policy: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: driftguard-ai
  labels:
    app.kubernetes.io/part-of: driftguard
    pod-security.kubernetes.io/enforce: baseline
    cilium.io/policy: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: driftguard-gateway
  labels:
    app.kubernetes.io/part-of: driftguard
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: driftguard-observability
  labels:
    app.kubernetes.io/part-of: driftguard
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: driftguard-security
  labels:
    app.kubernetes.io/part-of: driftguard
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: driftguard-argocd
  labels:
    app.kubernetes.io/part-of: driftguard
    pod-security.kubernetes.io/enforce: restricted
