# Prometheus alerting rules — SLO-based alerts for DriftGuard

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: driftguard-slos
  namespace: driftguard-observability
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:

  # ── API SLO: 99.9% availability ───────────────────────────────────────────
  - name: driftguard.api.slo
    interval: 30s
    rules:
    - record: dg:api:request_rate5m
      expr: |
        sum(rate(http_requests_total{job="driftguard-api"}[5m]))

    - record: dg:api:error_rate5m
      expr: |
        sum(rate(http_requests_total{job="driftguard-api",status=~"5.."}[5m]))
        /
        sum(rate(http_requests_total{job="driftguard-api"}[5m]))

    - alert: APIHighErrorRate
      expr: dg:api:error_rate5m > 0.01
      for: 5m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "API error rate above 1% (SLO breach)"
        description: "Error rate is {{ $value | humanizePercentage }}. SLO is 99.9%."
        runbook_url: "https://docs.driftguard.io/runbooks/api-error-rate"

    - alert: APIHighLatency
      expr: |
        histogram_quantile(0.99,
          sum(rate(http_request_duration_seconds_bucket{job="driftguard-api"}[5m]))
          by (le)
        ) > 2.0
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "API P99 latency above 2s"
        description: "P99 is {{ $value }}s. Target is <2s."

  # ── Drift detection SLO ────────────────────────────────────────────────────
  - name: driftguard.pipeline.slo
    rules:
    - alert: PRAnalysisQueueDepthHigh
      expr: |
        redis_list_length{list="driftguard:analysis:queue"} > 50
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "PR analysis queue depth > 50 — workers may be undersized"

    - alert: IngestEndpointDown
      expr: |
        absent(http_requests_total{job="driftguard-api", path="/api/v1/ingest/event"})
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Ingest endpoint not receiving traffic"

  # ── Postgres ──────────────────────────────────────────────────────────────
  - name: driftguard.postgres
    rules:
    - alert: PostgresReplicationLagHigh
      expr: pg_replication_lag > 30
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Postgres replication lag > 30s"

    - alert: PostgresConnectionsNearLimit
      expr: |
        pg_stat_database_numbackends{datname="driftguard"}
        /
        pg_settings_max_connections > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Postgres connections above 80% of max_connections"

    - alert: PostgresPrimaryDown
      expr: |
        pg_up{job="driftguard-postgres", role="primary"} == 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "Postgres primary is down — CloudNativePG should auto-failover"

  # ── GPU workers ────────────────────────────────────────────────────────────
  - name: driftguard.gpu
    rules:
    - alert: GPUWorkerOOM
      expr: |
        container_oom_events_total{namespace="driftguard-ai"} > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "GPU embedding worker OOM killed"

    - alert: EmbeddingQueueBacklogged
      expr: |
        redis_list_length{list="driftguard:embedding:queue"} > 100
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Embedding queue backlogged — scale GPU workers"

  # ── Cost ──────────────────────────────────────────────────────────────────
  - name: driftguard.cost
    rules:
    - alert: UnscheduledPodsOnDemand
      expr: |
        count(kube_pod_info{node=~".*spot.*"} == 0) by (pod)
        > 5
      for: 30m
      labels:
        severity: info
      annotations:
        summary: "Multiple pods not scheduled on spot — cost may be elevated"
