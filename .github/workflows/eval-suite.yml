name: eval-suite

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'UP2CLOUD'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Sync deps
        working-directory: apps/api
        run: uv sync --all-extras

      - name: Check API key is configured
        id: key_check
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "⚠ ANTHROPIC_API_KEY secret not set — skipping evals (no cost, no failure)"
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
            echo "✓ ANTHROPIC_API_KEY present — running evals"
          fi

      - name: Run eval suite (costs $)
        if: steps.key_check.outputs.has_key == 'true'
        working-directory: apps/api
        env:
          DRIFTGUARD_RUN_EVAL: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest tests/eval -v --tb=short

      - name: Report results
        if: always()
        run: |
          if [ "${{ steps.key_check.outputs.has_key }}" == "false" ]; then
            echo "ℹ Eval suite skipped — add ANTHROPIC_API_KEY to repository secrets to enable"
          else
            echo "✓ Eval suite completed — check logs for any quality regressions"
          fi
