# DriftGuard — Kubernetes deploy pipeline (GKE target state)
#
# ACTIVATION REQUIREMENT: This workflow is manual-only (workflow_dispatch)
# until the following GCP infrastructure exists and vars/secrets are set:
#   vars.GCP_WIF_PROVIDER     — Workload Identity Federation provider
#   vars.GCP_DEPLOYER_SA      — Deployer service account email
#   vars.GCP_PROJECT          — GCP project ID
#   secrets.GITOPS_PAT        — PAT with write access to driftguard-gitops repo
#   secrets.KUBECONFIG        — Base64-encoded kubeconfig for the GKE cluster
#
# Current production deploy: .github/workflows/deploy-api.yml (Cloud Run)
# This workflow: future state — activates when GKE cluster is provisioned.

name: deploy-k8s

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]
      skip_tests:
        description: "Skip tests (emergency deploy only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write

env:
  REGISTRY: europe-west1-docker.pkg.dev
  PROJECT: ${{ vars.GCP_PROJECT || 'driftguard-prod' }}
  REGION:  ${{ vars.GCP_REGION  || 'europe-west1' }}

jobs:
  # ── Preflight: verify required secrets exist ──────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    outputs:
      gcp_ready: ${{ steps.check.outputs.gcp_ready }}
    steps:
    - name: Check GCP configuration
      id: check
      run: |
        if [ -z "${{ vars.GCP_WIF_PROVIDER }}" ] || [ -z "${{ vars.GCP_DEPLOYER_SA }}" ]; then
          echo "gcp_ready=false" >> "$GITHUB_OUTPUT"
          echo "::warning::GCP not configured. Set vars.GCP_WIF_PROVIDER and vars.GCP_DEPLOYER_SA."
          echo "::warning::Workflow will run tests only and skip build/deploy."
        else
          echo "gcp_ready=true" >> "$GITHUB_OUTPUT"
        fi

  # ── 1. Test (always runs — no external deps) ──────────────────────────────
  test-api:
    needs: preflight
    if: inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: driftguard
          POSTGRES_PASSWORD: driftguard
          POSTGRES_DB: driftguard
        options: >-
          --health-cmd "pg_isready -U driftguard"
          --health-interval 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
      with:
        version: latest

    - name: Sync deps
      working-directory: apps/api
      run: uv sync --all-extras

    - name: Lint
      working-directory: apps/api
      run: uv run ruff check . && uv run ruff format --check .

    - name: Test
      working-directory: apps/api
      env:
        DATABASE_URL: postgresql+asyncpg://driftguard:driftguard@localhost:5432/driftguard
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: ci-deploy-key-at-least-32-chars!!
        ENVIRONMENT: ci
      run: uv run pytest -v --ignore=tests/eval

  # ── 2. Build + sign (GCP required) ────────────────────────────────────────
  build-api:
    needs: [preflight, test-api]
    if: |
      always() &&
      needs.preflight.outputs.gcp_ready == 'true' &&
      (needs.test-api.result == 'success' || inputs.skip_tests == 'true')
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image:  ${{ steps.meta.outputs.tags }}

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
      with:
        workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
        service_account: ${{ vars.GCP_DEPLOYER_SA }}

    - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

    - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.PROJECT }}/api/driftguard-api
        tags: |
          type=sha,prefix=,suffix=,format=short
          type=raw,value=latest,enable=${{ inputs.environment == 'prod' }}

    - name: Build and push
      id: push
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: apps/api
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        sbom: true
        provenance: mode=max
        build-args: |
          GIT_SHA=${{ github.sha }}

    - name: Generate SBOM
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.PROJECT }}/api/driftguard-api@${{ steps.push.outputs.digest }}
        format: spdx-json
        artifact-name: api-sbom-${{ github.sha }}.spdx.json

    - name: Scan for CVEs
      id: scan
      uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a # v3
      with:
        image: ${{ env.REGISTRY }}/${{ env.PROJECT }}/api/driftguard-api@${{ steps.push.outputs.digest }}
        fail-build: ${{ inputs.environment == 'prod' }}
        severity-cutoff: critical
        output-format: sarif

    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}

    - name: Sign image (Cosign keyless)
      uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

    - run: |
        cosign sign --yes \
          ${{ env.REGISTRY }}/${{ env.PROJECT }}/api/driftguard-api@${{ steps.push.outputs.digest }}

  # ── 3. Deploy via GitOps → ArgoCD ─────────────────────────────────────────
  deploy:
    needs: [preflight, build-api]
    if: |
      always() &&
      needs.preflight.outputs.gcp_ready == 'true' &&
      needs.build-api.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: https://app.driftguard.io

    steps:
    - name: Checkout gitops repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: UP2CLOUD/driftguard-gitops
        token: ${{ secrets.GITOPS_PAT }}
        path: gitops

    - name: Install yq
      run: |
        wget -qO /usr/local/bin/yq \
          https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        chmod +x /usr/local/bin/yq

    - name: Update image in gitops repo
      run: |
        ENV="${{ inputs.environment }}"
        DIGEST="${{ needs.build-api.outputs.digest }}"
        SHA="${{ github.sha }}"
        FILE="gitops/envs/${ENV}/api/values-prod.yaml"

        # Create file if it doesn't exist yet
        mkdir -p "$(dirname $FILE)"
        [ -f "$FILE" ] || echo "{}" > "$FILE"

        yq e ".image.tag = \"${SHA:0:7}\"" -i "$FILE"
        yq e ".image.digest = \"$DIGEST\"" -i "$FILE"
        yq e '.podAnnotations["dg.io/deployed-at"] = "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"' -i "$FILE"
        yq e '.podAnnotations["dg.io/deployed-by"] = "${{ github.actor }}"' -i "$FILE"

        cd gitops
        git config user.name  "DriftGuard CI"
        git config user.email "ci@driftguard.io"
        git add -A
        git diff --staged --quiet && echo "No changes" && exit 0

        MSG="chore(${ENV}): deploy api ${SHA:0:7}\n\nDigest: ${DIGEST}\nActor: ${{ github.actor }}"
        git commit -m "$MSG"

        git push

    - name: Wait for ArgoCD sync (optional)
      continue-on-error: true
      env:
        KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
      run: |
        echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
        kubectl --kubeconfig=/tmp/kubeconfig \
          -n driftguard-argocd \
          wait application/driftguard-api \
          --for=condition=Healthy \
          --timeout=300s \
        || echo "ArgoCD wait timed out — check dashboard"
        rm -f /tmp/kubeconfig

    - name: Smoke test
      run: |
        BASE="https://api.driftguard.io"
        for i in 1 2 3 4 5; do
          STATUS=$(curl -sf "${BASE}/api/v1/health" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','?'))" 2>/dev/null || echo "unreachable")
          echo "Attempt $i: $STATUS"
          [ "$STATUS" = "ok" ] && exit 0
          sleep 15
        done
        echo "Smoke test failed after 5 attempts"
        exit 1

    - name: Notify Slack
      if: always()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        RESULT="${{ job.status }}"
        COLOR=$([ "$RESULT" = "success" ] && echo "#22d38d" || echo "#ff4757")
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{
            \"attachments\": [{
              \"color\": \"${COLOR}\",
              \"text\": \"*Deploy ${{ inputs.environment }}*: ${RESULT}\nAPI: \`${{ github.sha }}\`\nActor: ${{ github.actor }}\"
            }]
          }" || true
