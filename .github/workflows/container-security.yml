# Container security scanning — SBOM, CVE scan, Cosign signing
# Runs as part of deploy-k8s.yml when GCP is configured.
# Standalone mode: workflow_dispatch for one-off scans.

name: container-security

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Full image reference to scan (registry/repo/name:tag)"
        required: true

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Generate SBOM with Syft
      uses: anchore/sbom-action@v0
      with:
        image: ${{ inputs.image }}
        format: spdx-json
        artifact-name: sbom-scan.spdx.json

    - name: Scan with Grype
      id: scan
      uses: anchore/scan-action@v3
      with:
        sbom: sbom-scan.spdx.json
        fail-build: false
        severity-cutoff: high
        output-format: sarif

    - name: Upload SARIF to Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}
        category: container-security

    - name: Summary
      run: |
        echo "## Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
        echo "Image: \`${{ inputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "SBOM artifact: sbom-scan.spdx.json" >> "$GITHUB_STEP_SUMMARY"
