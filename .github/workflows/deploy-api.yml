name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "infra/terraform/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  REGION: ${{ vars.GCP_REGION }}
  AR_REPO: driftguard

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        working-directory: apps/api
        run: |
          IMAGE=${REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/api:${GITHUB_SHA}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init + apply
        working-directory: infra/terraform/envs/dev
        env:
          TF_VAR_gcp_project: ${{ env.GCP_PROJECT }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_api_image: ${{ env.IMAGE }}
        run: |
          terraform init \
            -backend-config="bucket=${GCP_PROJECT}-tfstate" \
            -backend-config="prefix=envs/dev"
          terraform apply -auto-approve

      - name: Smoke test
        run: |
          URL=$(cd infra/terraform/envs/dev && terraform output -raw api_url)
          curl -fsS "$URL/api/v1/health"
