name: deploy-api

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  REGION: ${{ vars.GCP_REGION }}
  AR_REPO: driftguard

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: driftguard
          POSTGRES_PASSWORD: driftguard
          POSTGRES_DB: driftguard
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U driftguard"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Sync deps
        working-directory: apps/api
        run: uv sync --all-extras
      - name: Lint
        working-directory: apps/api
        run: uv run ruff check . && uv run ruff format --check .
      - name: Test
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://driftguard:driftguard@localhost:5432/driftguard
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci
          ENVIRONMENT: ci
        run: uv run pytest -v --ignore=tests/eval
      - name: Checkov (Dockerfile)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: apps/api
          framework: dockerfile
          soft_fail: false

  infra-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive
      - name: Terraform validate
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init -backend=false
          terraform validate
      - name: Checkov (Terraform)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: false
          skip_check: CKV_GCP_12,CKV_GCP_68,CKV_GCP_78,CKV_GCP_62,CKV_GCP_63,CKV_GCP_84,CKV_GCP_117,CKV_GCP_46,CKV_GCP_42,CKV_GCP_49,CKV_GCP_41,CKV_GCP_125,CKV_AWS_49,CKV_AWS_108,CKV_AWS_283,CKV_AWS_358,CKV_AWS_1,CKV_AWS_109,CKV_AWS_111,CKV_AWS_107,CKV_AWS_110,CKV_AWS_356,CKV2_AWS_56

  deploy:
    needs: [ci, infra-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build & push image
        working-directory: apps/api
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/api:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform apply
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        env:
          TF_VAR_gcp_project: ${{ env.GCP_PROJECT }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_api_image: ${{ env.IMAGE }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_PROJECT }}-tfstate" \
            -backend-config="prefix=envs/${{ inputs.environment }}"
          terraform apply -auto-approve
      - name: Smoke test
        run: |
          URL=$(cd infra/terraform/envs/${{ inputs.environment }} && terraform output -raw api_url)
          curl -fsS "$URL/api/v1/health"
