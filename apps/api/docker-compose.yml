# Local dev stack — Postgres + pgvector + Redis
# Usage: docker compose up -d
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: driftguard
      POSTGRES_PASSWORD: driftguard
      POSTGRES_DB: driftguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftguard"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  worker:
    build: .
    command: celery -A driftguard.worker.app worker -Q analysis,notifications -c 2 --loglevel=info
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://driftguard:driftguard@db:5432/driftguard
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  flower:
    image: mher/flower:2.0
    command: celery flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  pgdata:
