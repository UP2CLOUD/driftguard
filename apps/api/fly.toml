# Fly.io deployment configuration for DriftGuard API
# Free tier: 3 shared-cpu-1x machines, 256MB RAM each
# Deploy:  fly launch --copy-config (first time) → fly deploy
# Logs:    fly logs -a driftguard-api
# SSH:     fly ssh console -a driftguard-api

app = "driftguard-api"
primary_region = "fra"   # Frankfurt — closest to Portugal/EU
kill_signal = "SIGINT"
kill_timeout = "30s"

[deploy]
  # Run DB migrations in a temporary release container before the new
  # version goes live.  The [processes] section starts uvicorn directly,
  # bypassing start.sh, so without this the schema drifts behind the code.
  release_command = "alembic upgrade head"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"

# Single internal port — Fly's edge handles TLS termination
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"          # Free tier: stop when idle
  auto_start_machines = true            # Restart on incoming traffic
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  # Health check — Fly polls this every 10s to confirm the app is alive
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/health"

# VM sizing (free tier eligible)
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"                       # 256mb is too tight for psycopg + redis pool
  cpu_kind = "shared"
  cpus = 1
  processes = ["app"]

# Two processes share the same image: API server + Celery worker
[processes]
  app    = "uvicorn driftguard.main:app --host 0.0.0.0 --port 8000 --workers 1"
  worker = "celery -A driftguard.worker.app worker --loglevel=info --concurrency=2"
